<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto Saray Medinilla</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #000, #ff6700);
  margin: 0;
}

.card {
  background: #fff8f0;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 { color: #ff6700; }

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 25px;
  background: #ff6700;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>Saray Medinilla</h1>

  <p><strong>Empresa:</strong> Unlock S.L</p>
  <p><strong>Puesto:</strong> Gerente</p>
  <p><strong>Email:</strong> saray.medgon@educa.jcyl.es</p>
  <p><strong>Tel:</strong> +34 677 14 28 47</p>

  <a class="button" href="#" onclick="guardarContacto()">Añadir contacto</a>
</div>

<script>
function guardarContacto() {

  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Saray Medinilla
ORG:Unlock S.L
TITLE:Gerente
TEL:+34677142847
EMAIL:saray.medgon@educa.jcyl.es
ADR:;;C/ de la Estación, 51, Miranda de Ebro, Burgos, España;;;;
URL:https://unlockescaperoom.wordpress.com/
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "saray_medinilla.vcf";

  document.body.appendChild(a);
  a.click();

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
