<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto Saray Medinilla</title>

<style>
body{

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:linear-gradient(135deg,#1a1a1a,#ff7a1a);
  margin:0;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  border-top:6px solid #ff7a1a;
}

h1{
  color:#ff7a1a;
  font-size:1.8em;
  margin-bottom:10px;
}

p{
  color:#333;
  margin:8px 0;
  font-size:1em;
}

strong{
  color:#ff7a1a;
}

.qr{
  margin:25px auto;
  width:200px;
  height:200px;
  padding:10px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.footer-text{
  font-size:12px;
  margin-top:10px;
  color:#777;
}
</style>
</head>

<body>

<div class="card">
  <h1>Saray Medinilla</h1>

  <p><strong>Unlock S.L</strong></p>
  <p>Gerente</p>
  <p>+34 677 14 28 47</p>
  <p>saray.medgon@educa.jcyl.es</p>

  <div id="qr" class="qr"></div>

  <p class="footer-text">
    Escanea para guardar el contacto
  </p>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:Saray Medinilla
ORG:Unlock S.L
TITLE:Gerente
TEL:+34677142847
EMAIL:saray.medgon@educa.jcyl.es
ADR:;;C/ de la Estación, 51, Miranda de Ebro, Burgos, España;;;;
URL:https://unlockescaperoom.wordpress.com/
END:VCARD`;

new QRCode(document.getElementById("qr"), {
  text: vcard,
  width: 200,
  height: 200
});
</script>

</body>
</html>
